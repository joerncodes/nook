title: nook
theme: atrium # quartz | atrium | marginalia

center:
  - type: greeting
    name: You
  - type: clock
    format24h: true
    showDate: true
    showWeek: true # show ISO calendar week number
    words: true # spell the time in english ("ten past seven.")
  - type: search
    engine: duckduckgo
    placeholder: Search the web…
  - type: readwise
    title: Readwise daily review
    showImage: true # show book/article cover, flexed to the left
    hideWhenDone: true # collapse the whole widget once you've finished the review
    # Get your token at https://readwise.io/access_token
    token: REPLACE_WITH_YOUR_READWISE_TOKEN

columns:
  - widgets:
      - type: links
        title: Dev
        columns: 1
        items:
          - title: GitHub
            url: https://github.com
          - title: Vercel
            url: https://vercel.com
          - title: Linear
            url: https://linear.app
      - type: note
        title: Today
        body: |
          - Standup 10:00
          - Review PRs
          - Plan sprint
  - widgets:
      - type: weather
        title: Köln
        # Look up lat/lon at https://www.latlong.net/ or any maps app
        lat: 50.9375
        lon: 6.9603
        label: Köln
        units: metric # metric | imperial
        days: 3 # 0 hides the forecast strip; max 7
      - type: links
        title: Reading
        columns: 1
        items:
          - title: Hacker News
            url: https://news.ycombinator.com
          - title: Lobste.rs
            url: https://lobste.rs
      - type: rss
        title: HN Front Page
        url: https://hnrss.org/frontpage
        limit: 8
      - type: todoist
        title: Todoist — today
        # https://todoist.com/help/articles/206137851 — filter syntax
        filter: today | overdue
        limit: 12
        hideSubtasks: true # only show top-level tasks
        # https://app.todoist.com/app/settings/integrations/developer
        token: REPLACE_WITH_YOUR_TODOIST_TOKEN
      - type: immich
        title: Photos
        baseUrl: https://immich.your.domain
        # User settings → API Keys
        apiKey: REPLACE_WITH_YOUR_IMMICH_API_KEY
        mode: favorites # favorites | onThisDay | album
        # onThisDay = "memories" (photos from this calendar day in past years)
        # albumId: <album-id> # required when mode: album
        limit: 6
        autoRotate: true # set false to require manual → clicks
        stats: true # set false to hide the photos/videos/storage row
        # orientation: portrait # optional: landscape | portrait — filter by aspect ratio
      - type: jellyfin
        title: Library
        baseUrl: https://jellyfin.your.domain
        # Dashboard → API Keys
        apiKey: REPLACE_WITH_YOUR_JELLYFIN_API_KEY
        # Dashboard → Users → pick a user → URL contains the userId,
        # or GET /Users with the API key
        userId: REPLACE_WITH_YOUR_JELLYFIN_USER_ID
        showLatestMovie: true # set false to hide the latest-added pick row entirely
        coverSize: medium # poster width when shown: small (48px) | medium (96px) | large (160px)
      - type: linkwarden
        title: Bookmarks
        baseUrl: https://linkwarden.your.domain
        # Settings → Access Tokens
        token: REPLACE_WITH_YOUR_LINKWARDEN_TOKEN
        limit: 8 # recent saves shown (1–20)
        search: true # show the search field with autocomplete; press `/` to focus
        searchPlaceholder: Search bookmarks…
        # collectionId: 3 # optional — scope recent + search to one collection
        # tagId: 12 # optional — scope to one tag (combinable with collectionId)
      - type: kimai
        title: Time this week
        # Self-hosted, so reach it over the shared docker network by the
        # service name and its INTERNAL port (not the host-published port).
        baseUrl: http://kimai:8001
        # User profile → API access → create a token (NOT your password).
        token: REPLACE_WITH_YOUR_KIMAI_API_TOKEN
        limit: 5 # top N projects by tracked time (1–10)
        weekStart: monday # monday | sunday — when the week window opens
      - type: calendar
        title: Upcoming
        # ICS URLs are credentials in disguise — anyone with the URL can read
        # your calendar. This file is gitignored; keep it that way.
        sources:
          - label: Personal
            color: "#7c9885"
            # Google: Calendar settings → integrate calendar → "Secret address in iCal format"
            # iCloud: share calendar → public → use the webcal:// URL (we rewrite to https)
            url: https://calendar.google.com/calendar/ical/.../basic.ics
          - label: Work
            color: "#b08968"
            url: https://nextcloud.example/remote.php/dav/calendars/me/work?export
        limit: 5 # max events shown (1–20)
        days: 14 # look-ahead window (1–60); set to 31 for full-month dot coverage
        showAllDay: true
        relativeDays: true # "Today" / "Tomorrow" labels; false = always "Wed 18 Jun"
        showMonth: true # mini month grid above the events with today as an accent badge
        weekStart: mon # mon | sun
