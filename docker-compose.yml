services:
  nook:
    image: ghcr.io/${GHCR_OWNER:-yourname}/nook:${NOOK_TAG:-latest}
    # For local builds, comment the `image:` line above and uncomment:
    # build:
    #   context: .
    container_name: nook
    restart: unless-stopped
    ports:
      - "${NOOK_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      CONFIG_PATH: /config/dashboard.yaml
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - ./config:/config:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
